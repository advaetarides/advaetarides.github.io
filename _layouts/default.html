<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — {{ site.title }}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0a1628; color:#e2e8f0; font-family:'Inter',sans-serif; min-height:100vh; }
    h1, h2, h3 { font-family:'Orbitron',monospace; }
    a { color:#22d3ee; }
    a:hover { color:#fff; }

    nav { display:flex; justify-content:space-between; align-items:center; padding:16px 30px; border-bottom:1px solid #1e3a5f; }
    .nav-brand { font-family:'Orbitron',monospace; font-weight:900; font-size:1.1rem; color:#fff; text-decoration:none; letter-spacing:3px; }
    .nav-links { display:flex; gap:24px; }
    .nav-links a { font-size:0.85rem; color:#94a3b8; text-decoration:none; letter-spacing:1px; }
    .nav-links a:hover { color:#22d3ee; }

    main { max-width:900px; margin:0 auto; padding:20px; }

    footer { text-align:center; padding:30px; color:#334155; font-size:0.7rem; letter-spacing:2px; border-top:1px solid #1e3a5f; margin-top:60px; }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-brand">advaetaRides</a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/tools/fits.html">FITS Tool</a>
      <a href="/about">About</a>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer>advaetaRides — Searching for the Perfect Partner</footer>
</body>
</html>
